<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ONE LINE · 공용 To-do</title>
<style>
:root{--ink:#202226;--soft:#71757c;--line:#e5e6e8;--paper:#fffefa;--lime:#dfff5e;--blue:#2758e8;--page:#f5f5f1;--field:#f1f1ec}*{box-sizing:border-box}body{margin:0;background:var(--page);color:var(--ink);font:15px/1.45 system-ui,"Apple SD Gothic Neo",sans-serif}body.dark{--ink:#f1f1ef;--soft:#a6a8af;--line:#363943;--paper:#1d1f25;--page:#121317;--field:#292c34;--blue:#7596ff}main{max-width:850px;margin:auto;padding:clamp(28px,7vw,76px) 20px 60px}header{display:flex;justify-content:space-between;align-items:center;margin-bottom:38px}.logo{font-weight:900;letter-spacing:-.06em;font-size:1.35rem}.today,.notice{color:var(--soft);font-size:.85rem}h1{font-size:clamp(2.25rem,7vw,4.8rem);letter-spacing:-.085em;line-height:.98;max-width:700px;margin:0 0 15px}.highlight{background:linear-gradient(transparent 63%,var(--lime) 63%)}.lead{margin:0;color:var(--soft);font-size:1.03rem}.entry{margin-top:38px;background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:14px}.entry label{display:block;font-weight:800;font-size:.76rem;letter-spacing:.08em;margin:0 6px 9px}.row{display:flex;gap:9px}input[type=text]{min-width:0;flex:1;border:0;outline:0;background:var(--field);border-radius:10px;padding:15px;font:inherit;color:var(--ink)}button{border:0;border-radius:10px;background:var(--blue);color:#fff;font-weight:800;padding:0 20px;cursor:pointer}button:hover{filter:brightness(1.1)}.format,.hint{margin:12px 6px 1px;color:var(--soft);font-size:.79rem}.hint{margin-top:19px}.format code{background:var(--field);padding:2px 5px;border-radius:4px;color:var(--ink)}section{margin-top:42px}.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}.section-head h2{font-size:.82rem;letter-spacing:.1em;margin:0}.head-right{display:flex;gap:8px;align-items:center}.count{background:var(--field);border-radius:999px;padding:2px 8px;font-size:.75rem;color:var(--soft)}select{border:1px solid var(--line);background:var(--paper);color:var(--ink);border-radius:7px;padding:5px 7px;font:inherit;font-size:.75rem}.empty{padding:34px 0;color:#8d9096;border-top:1px solid var(--line);text-align:center}ul{list-style:none;margin:0;padding:0;border-top:1px solid var(--line)}li{display:grid;grid-template-columns:26px 1fr auto;gap:12px;align-items:center;border-bottom:1px solid var(--line);padding:15px 4px}.check{appearance:none;width:20px;height:20px;border:1.5px solid #aeb1b7;border-radius:50%;cursor:pointer}.check:checked{background:var(--lime);border-color:var(--lime)}li.done .task{text-decoration:line-through;color:#92959a}.task{font-weight:700}.meta{margin-top:2px;color:var(--soft);font-size:.82rem}.actions{display:flex}.edit,.delete,.mode{font-size:1.05rem;color:var(--soft);background:none;padding:5px 8px}.edit:hover{color:var(--blue)}.delete:hover{color:#d33}.mode{border:1px solid var(--line);border-radius:999px;font-size:.77rem;color:var(--ink);padding:7px 11px}@media(max-width:520px){.row{display:block}.row button{width:100%;height:47px;margin-top:8px}li{grid-template-columns:25px 1fr 28px}}
</style></head><body><main>
<header><div class="logo">ONE LINE</div><div style="display:flex;gap:12px;align-items:center"><div class="today" id="today"></div><button class="mode" id="mode">☾ 다크</button></div></header>
<h1>생각할 일을<br><span class="highlight">한 줄로 남겨요.</span></h1><p class="lead">이 목록은 링크를 여는 모두와 실시간으로 공유됩니다.</p>
<div class="entry"><label for="input">한 줄 입력</label><div class="row"><input id="input" type="text" autocomplete="off" placeholder="치과 예약 :: 260703 :: 1430 :: 강남" autofocus><button id="add">추가하기</button></div><p class="format"><code>할 일 :: YYMMDD :: HHMM :: 장소</code> &nbsp;날짜·시간·장소는 필요할 때만 적어도 됩니다.</p></div>
<p class="hint"><b>Enter</b>로 바로 추가 · <b>260703</b>은 2026. 07. 03으로 표시됩니다.</p>
<section><div class="section-head"><h2>SHARED TO DO</h2><div class="head-right"><select id="sort" aria-label="정렬 기준"><option value="date">날짜 빠른 순</option><option value="new">새로 추가한 순</option><option value="name">이름 순</option></select><span class="count" id="count">0</span></div></div><ul id="list"></ul><div class="empty" id="empty">아직 할 일이 없어요. 첫 번째 한 줄을 적어보세요.</div></section>
</main><script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js';
import{getFirestore,collection,addDoc,updateDoc,deleteDoc,doc,onSnapshot,query,orderBy}from'https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js';
const config={apiKey:'AIzaSyDB-GxN4p7Thal_3aoJgw5XxBklaxa7si8',authDomain:'one-line-todo-app.firebaseapp.com',projectId:'one-line-todo-app',storageBucket:'one-line-todo-app.firebasestorage.app',messagingSenderId:'515912090589',appId:'1:515912090589:web:9572433515548b27c42c34'};
const db=getFirestore(initializeApp(config)),ref=collection(db,'shared_todos'),$=s=>document.querySelector(s);let todos=[],sortBy=localStorage.getItem('one-line-sort')||'date';
$('#today').textContent=new Intl.DateTimeFormat('ko-KR',{month:'long',day:'numeric',weekday:'short'}).format(new Date());
function date(v){if(!/^\d{6}$/.test(v||''))return v||'';let y=2000+Number(v.slice(0,2)),m=Number(v.slice(2,4)),d=Number(v.slice(4));return m>0&&m<13&&d>0&&d<32?`${y}. ${String(m).padStart(2,'0')}. ${String(d).padStart(2,'0')}`:v}function time(v){return/^\d{4}$/.test(v||'')?`${v.slice(0,2)}:${v.slice(2)}`:v||''}
function render(){let list=$('#list');list.innerHTML='';$('#empty').hidden=todos.length>0;$('#count').textContent=todos.filter(t=>!t.done).length;let view=[...todos].sort((a,b)=>sortBy==='new'?b.createdAt-a.createdAt:sortBy==='name'?a.task.localeCompare(b.task,'ko'):((a.date||'99999999').replace(/\D/g,'').localeCompare((b.date||'99999999').replace(/\D/g,''))||b.createdAt-a.createdAt));for(const t of view){let li=document.createElement('li');li.className=t.done?'done':'';li.innerHTML=`<input class="check" type="checkbox" aria-label="완료 표시" ${t.done?'checked':''}><div><div class="task"></div><div class="meta"></div></div><div class="actions"><button class="edit" aria-label="수정">✎</button><button class="delete" aria-label="삭제">×</button></div>`;li.querySelector('.task').textContent=t.task;li.querySelector('.meta').textContent=[t.date,t.time,t.place].filter(Boolean).join(' · ')||'언제든';li.querySelector('.check').onchange=()=>updateDoc(doc(db,'shared_todos',t.id),{done:!t.done});li.querySelector('.edit').onclick=()=>{ $('#input').value=[t.task,(t.date||'').replace(/\. /g,'').replace(/^20/,'').replace(/\./g,''),(t.time||'').replace(':',''),t.place].filter((v,i)=>i===0||v).join(' :: ');deleteDoc(doc(db,'shared_todos',t.id));$('#input').focus()};li.querySelector('.delete').onclick=()=>deleteDoc(doc(db,'shared_todos',t.id));list.append(li)}}
async function add(){let [task,d,tm,place]=$('#input').value.split('::').map(x=>x.trim());if(!task)return;await addDoc(ref,{task,date:date(d),time:time(tm),place:place||'',done:false,createdAt:Date.now()});$('#input').value='';$('#input').focus()}$('#add').onclick=add;$('#input').onkeydown=e=>{if(e.key==='Enter')add()};$('#sort').value=sortBy;$('#sort').onchange=e=>{sortBy=e.target.value;localStorage.setItem('one-line-sort',sortBy);render()};function mode(d){document.body.classList.toggle('dark',d);$('#mode').textContent=d?'☀ 라이트':'☾ 다크';localStorage.setItem('one-line-dark',d?'1':'0')}mode(localStorage.getItem('one-line-dark')==='1');$('#mode').onclick=()=>mode(!document.body.classList.contains('dark'));onSnapshot(query(ref,orderBy('createdAt','desc')),s=>{todos=s.docs.map(x=>({id:x.id,...x.data()}));render()},()=>{$('#empty').hidden=false;$('#empty').textContent='목록을 불러오지 못했습니다. 잠시 후 다시 시도해 주세요.'});
</script></body></html>
